<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 480" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="gUser" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1F4E79"/><stop offset="1" stop-color="#123A5C"/></linearGradient>
    <linearGradient id="gQueue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#B26A00"/><stop offset="1" stop-color="#8A5200"/></linearGradient>
    <linearGradient id="gAdmin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0AAB52"/><stop offset="1" stop-color="#078540"/></linearGradient>
    <linearGradient id="gLive" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5B3AA6"/><stop offset="1" stop-color="#432A80"/></linearGradient>
    <marker id="arH" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#9AA5B1"/></marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1F2937" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1180" height="480" fill="#FAFBFC"/>

  <text x="590" y="34" text-anchor="middle" font-size="21" font-weight="800" fill="#0F172A">From request to live interface</text>
  <text x="590" y="55" text-anchor="middle" font-size="12.5" fill="#64748B">How a standard user's request becomes a running MFT interface, end to end</text>

  <!-- Stage 1: Standard User -->
  <g filter="url(#soft)">
    <rect x="40" y="110" width="230" height="230" rx="18" fill="#ffffff" stroke="#E2E8F0"/>
  </g>
  <rect x="40" y="110" width="230" height="56" rx="18" fill="url(#gUser)"/>
  <rect x="40" y="148" width="230" height="18" fill="url(#gUser)"/>
  <text x="155" y="145" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">STANDARD USER</text>
  <circle cx="155" cy="205" r="24" fill="#EAF1FA"/>
  <path d="M155,193 a11,11 0 1 1 -0.1,0 z M138,228 q17,-16 34,0" stroke="#1F4E79" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="155" y="260" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Logs in &amp; opens</text>
  <text x="155" y="277" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">the request wizard</text>
  <text x="155" y="300" text-anchor="middle" font-size="10.5" fill="#64748B">Requirement → Source →</text>
  <text x="155" y="315" text-anchor="middle" font-size="10.5" fill="#64748B">Destination → File &amp; Trigger</text>
  <text x="155" y="333" text-anchor="middle" font-size="11" fill="#1F4E79" font-weight="700">Submits the request</text>

  <path d="M270,225 h45" stroke="#9AA5B1" stroke-width="2" marker-end="url(#arH)"/>

  <!-- Stage 2: Queue -->
  <g filter="url(#soft)">
    <rect x="320" y="110" width="230" height="230" rx="18" fill="#ffffff" stroke="#E2E8F0"/>
  </g>
  <rect x="320" y="110" width="230" height="56" rx="18" fill="url(#gQueue)"/>
  <rect x="320" y="148" width="230" height="18" fill="url(#gQueue)"/>
  <text x="435" y="145" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">REQUEST QUEUE</text>
  <rect x="405" y="190" width="60" height="14" rx="4" fill="#FDECC8"/>
  <rect x="405" y="210" width="60" height="14" rx="4" fill="#FDECC8"/>
  <rect x="405" y="230" width="60" height="14" rx="4" fill="#FCE0A8"/>
  <text x="435" y="272" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Waits, oldest first,</text>
  <text x="435" y="289" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">for admin review</text>
  <text x="435" y="311" text-anchor="middle" font-size="10.5" fill="#64748B">Connection tests &amp; duplicate</text>
  <text x="435" y="326" text-anchor="middle" font-size="10.5" fill="#64748B">check already attached</text>

  <path d="M550,225 h45" stroke="#9AA5B1" stroke-width="2" marker-end="url(#arH)"/>

  <!-- Stage 3: Admin -->
  <g filter="url(#soft)">
    <rect x="600" y="110" width="230" height="230" rx="18" fill="#ffffff" stroke="#E2E8F0"/>
  </g>
  <rect x="600" y="110" width="230" height="56" rx="18" fill="url(#gAdmin)"/>
  <rect x="600" y="148" width="230" height="18" fill="url(#gAdmin)"/>
  <text x="715" y="145" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">MFT ADMIN</text>
  <circle cx="715" cy="205" r="24" fill="#E7F7ED"/>
  <path d="M715,193 a11,11 0 1 1 -0.1,0 z M698,228 q17,-16 34,0" stroke="#0A6B36" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="715" y="260" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Reviews evidence &amp;</text>
  <text x="715" y="277" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">decides</text>
  <rect x="660" y="292" width="55" height="24" rx="12" fill="#0AAB52"/>
  <text x="687" y="308" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">Approve</text>
  <rect x="720" y="292" width="55" height="24" rx="12" fill="#DC2626"/>
  <text x="747" y="308" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">Deny</text>

  <path d="M830,225 h45" stroke="#9AA5B1" stroke-width="2" marker-end="url(#arH)"/>
  <text x="853" y="216" font-size="9.5" fill="#64748B">if approved</text>

  <!-- Stage 4: Live -->
  <g filter="url(#soft)">
    <rect x="900" y="110" width="240" height="230" rx="18" fill="#ffffff" stroke="#E2E8F0"/>
  </g>
  <rect x="900" y="110" width="240" height="56" rx="18" fill="url(#gLive)"/>
  <rect x="900" y="148" width="240" height="18" fill="url(#gLive)"/>
  <text x="1020" y="145" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">LIVE MFT INTERFACE</text>
  <circle cx="1020" cy="215" r="26" fill="#F1EBFB"/>
  <path d="M1008,215 l9,9 l17,-19" stroke="#5B3AA6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1020" y="268" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">Boomi provisions &amp;</text>
  <text x="1020" y="285" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">deploys automatically</text>
  <text x="1020" y="307" text-anchor="middle" font-size="10.5" fill="#64748B">No manual build — the user</text>
  <text x="1020" y="322" text-anchor="middle" font-size="10.5" fill="#64748B">is notified the moment it's live</text>

  <text x="590" y="405" text-anchor="middle" font-size="11" fill="#94A3B8">Every step above is visible to the requester in real time — no status has to be chased by email.</text>
  <rect x="240" y="425" width="700" height="1" fill="#E2E8F0"/>
  <text x="590" y="452" text-anchor="middle" font-size="10" fill="#B0B8C1">Intelligrator — Managed File Transfer on Boomi</text>
</svg>
