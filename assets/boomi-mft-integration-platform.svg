<text x="620" y="27.0" text-anchor="middle" dominant-baseline="middle" font-size="13.5" font-weight="700" fill="#ffffff">MFT ↔ Integration Platform — the Boomi MFT Connector (event-driven file transfer · control &amp; data channels)</text>
