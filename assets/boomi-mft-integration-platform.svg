<text x="106" y="766" font-size="10" font-weight="600" fill="#3d4653" text-anchor="start">Target data channel (outbound file)</text>
<path d="M360,736 L394,736" stroke="#333" stroke-width="2.4" stroke-dasharray="6 4"/>
<text x="402" y="740" font-size="10" font-weight="600" fill="#3d4653" text-anchor="start">MFT control channel (event / schedule)</text>
<path d="M360,762 L394,762" stroke="#2f6fdb" stroke-width="2.4"/>
<text x="402" y="766" font-size="10" font-weight="600" fill="#3d4653" text-anchor="start">Programmatic control &amp; reporting over REST API</text>
<text x="700" y="730" font-size="10" font-weight="700" fill="#8a2b4a" text-anchor="start">Key point: MFT is not a silo. The Integration Platform triggers &amp;</text>
<text x="700" y="746" font-size="10" font-weight="600" fill="#8a2b4a" text-anchor="start">orchestrates transfers via the Boomi MFT Connector; MFT moves the</text>
<text x="700" y="762" font-size="10" font-weight="600" fill="#8a2b4a" text-anchor="start">bytes over SFTP/FTPS and exposes status/reporting APIs.</text>
<text x="700" y="778" font-size="10" font-weight="600" fill="#8a2b4a" text-anchor="start">Same platform · same governance · one audit trail.</text>
